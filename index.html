<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite 2D Casino Floor</title>
    <style>
        :root {
            --cell-width: 320px;
            --cell-height: 450px;
        }

        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* A belső konténer görget */
        }

        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            text-align: center;
            z-index: 1000;
            border-bottom: 2px solid #444;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* A hatalmas padló, ami minden irányba görgethető */
        #viewport {
            width: 100vw;
            height: 100vh;
            overflow: auto;
            padding-top: 80px; /* Hely a fejlécnek */
            scroll-behavior: smooth;
        }

        #casino-grid {
            display: grid;
            /* Dinamikusan fogjuk növelni az oszlopokat és sorokat JS-ből */
            grid-template-columns: repeat(var(--cols), var(--cell-width));
            grid-template-rows: repeat(var(--rows), var(--cell-height));
            gap: 30px;
            padding: 40px;
        }

        /* Slot Machine Design */
        .slot-machine {
            width: var(--cell-width);
            height: var(--cell-height);
            border-radius: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 15px;
            box-sizing: border-box;
            border: 3px solid #333;
            background: #111;
            transition: transform 0.2s, border-color 0.3s;
        }

        .slot-machine:hover {
            transform: scale(1.02);
            z-index: 10;
        }

        .reels {
            display: flex;
            justify-content: center;
            gap: 10px;
            background: #000;
            padding: 15px;
            border-radius: 8px;
        }

        .reel {
            width: 60px;
            height: 80px;
            background: white;
            color: black;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .btn {
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .spin-btn { background: #ff0055; color: white; }
        .auto-btn { background: transparent; border: 1px solid white; color: white; }

        /* "Érzékelők" a széleken az infinite scrollhoz */
        .sentinel {
            pointer-events: none;
            color: #444;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #coords-display {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <button id="spin-all" class="btn" style="background: #ffcc00; color: black;">Mindent Pörget</button>
        <div style="color: #00ff41; font-weight: bold; font-family: monospace; font-size: 20px;">VÉGTELEN KASZINÓ 2D</div>
        <button id="auto-all" class="btn" style="background: #00ff41; color: black;">Auto: KI</button>
    </div>

    <div id="viewport">
        <div id="casino-grid">
            </div>
    </div>

    <div id="coords-display">Pozíció: 0, 0</div>

    <script>
        const symbols = ['🍒', '🍋', '🍉', '💎', '7️⃣', '🔔', '🔥', '👑', '👾'];
        const adjectives = ['Neon', 'Cyber', 'Mega', 'Ultra', 'Retro', 'Space', 'Dark', 'Golden', 'Pixel', 'Sonic'];
        const nouns = ['Slot', 'King', 'Queen', 'Engine', 'Core', 'Galaxy', 'Spin', 'Force', 'Void'];

        let rowCount = 4;
        let colCount = 4;
        const machines = [];
        let globalAuto = false;

        const grid = document.getElementById('casino-grid');
        const viewport = document.getElementById('viewport');

        // Segédfüggvény a rács méretének frissítéséhez
        function updateGridStyles() {
            grid.style.setProperty('--cols', colCount);
            grid.style.setProperty('--rows', rowCount);
        }

        class SlotMachine {
            constructor(r, c) {
                this.r = r;
                this.c = c;
                this.config = this.generateConfig();
                this.isLocked = false;
                this.render();
            }

            generateConfig() {
                const hue = Math.floor(Math.random() * 360);
                return {
                    name: adjectives[Math.floor(Math.random() * adjectives.length)] + " " + nouns[Math.floor(Math.random() * nouns.length)],
                    color: `hsl(${hue}, 80%, 50%)`,
                    symbolPool: [...symbols].sort(() => 0.5 - Math.random())
                };
            }

            render() {
                const div = document.createElement('div');
                div.className = 'slot-machine';
                div.style.borderColor = this.config.color;
                div.style.gridRow = this.r;
                div.style.gridColumn = this.c;
                
                div.innerHTML = `
                    <div style="font-size: 12px; opacity: 0.5;">TEREM: ${this.r}-${this.c}</div>
                    <h3 style="color: ${this.config.color}; margin: 5px 0;">${this.config.name}</h3>
                    <div class="reels">
                        <div class="reel">?</div><div class="reel">?</div><div class="reel">?</div>
                    </div>
                    <button class="btn spin-btn">Pörget</button>
                    <div class="res" style="height: 20px; font-size: 14px;">Kész.</div>
                `;

                grid.appendChild(div);
                this.dom = div;
                this.reels = div.querySelectorAll('.reel');
                this.resTxt = div.querySelector('.res');
                div.querySelector('.spin-btn').onclick = () => this.spin();
            }

            spin() {
                if(this.isLocked) return;
                this.isLocked = true;
                this.resTxt.textContent = "Sorsolás...";
                
                this.reels.forEach((reel, i) => {
                    let count = 0;
                    const interval = setInterval(() => {
                        reel.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                        count++;
                        if(count > 10 + i * 5) {
                            clearInterval(interval);
                            if(i === 2) {
                                this.isLocked = false;
                                this.resTxt.textContent = "Próbáld újra!";
                                if(globalAuto) setTimeout(() => this.spin(), 1000);
                            }
                        }
                    }, 50);
                });
            }
        }

        // Gépek generálása egy adott tartományban
        function spawnMachines(startRow, endRow, startCol, endCol) {
            for(let r = startRow; r <= endRow; r++) {
                for(let c = startCol; c <= endCol; c++) {
                    // Csak akkor hozzuk létre, ha még nincs ott gép
                    if(!machines.find(m => m.r === r && m.c === c)) {
                        machines.push(new SlotMachine(r, c));
                    }
                }
            }
        }

        // Infinite Scroll logika
        viewport.onscroll = () => {
            const scrollX = viewport.scrollLeft;
            const scrollY = viewport.scrollTop;
            const maxScrollX = grid.offsetWidth - viewport.offsetWidth;
            const maxScrollY = grid.offsetHeight - viewport.offsetHeight;

            document.getElementById('coords-display').textContent = `Pozíció: X:${Math.round(scrollX)}, Y:${Math.round(scrollY)}`;

            // Ha közel érünk az aljához (lefelé generálás)
            if (maxScrollY - scrollY < 400) {
                const oldRows = rowCount;
                rowCount += 4;
                updateGridStyles();
                spawnMachines(oldRows + 1, rowCount, 1, colCount);
            }

            // Ha közel érünk a jobb széléhez (jobbra generálás)
            if (maxScrollX - scrollX < 400) {
                const oldCols = colCount;
                colCount += 4;
                updateGridStyles();
                spawnMachines(1, rowCount, oldCols + 1, colCount);
            }
        };

        // Kezdő beállítások
        updateGridStyles();
        spawnMachines(1, rowCount, 1, colCount);

        // Globális vezérlők
        document.getElementById('spin-all').onclick = () => machines.forEach(m => m.spin());
        document.getElementById('auto-all').onclick = (e) => {
            globalAuto = !globalAuto;
            e.target.textContent = globalAuto ? "Auto: BE" : "Auto: KI";
            if(globalAuto) machines.forEach(m => m.spin());
        };

    </script>
</body>
</html>
