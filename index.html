<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Félkarú Rabló</title>
    <style>
        /* Alapvető beállítások és háttér */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #2b0000 0%, #000000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        /* A gép doboza */
        .slot-machine {
            background: linear-gradient(145deg, #1a1a1a, #333333);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 0 30px #ff0055, inset 0 0 20px #000;
            border: 4px solid #ffd700;
            text-align: center;
            width: 400px;
        }

        /* Cím */
        h1 {
            margin-top: 0;
            font-size: 2.5em;
            color: #ffd700;
            text-shadow: 0 0 10px #ff8c00, 0 0 20px #ff0055;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Tárcsák konténere */
        .reels-container {
            display: flex;
            justify-content: space-between;
            background: #000;
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #555;
            box-shadow: inset 0 0 15px #000;
            margin-bottom: 30px;
        }

        /* Egyedi tárcsa */
        .reel {
            width: 90px;
            height: 120px;
            background: linear-gradient(180deg, #e6e6e6 0%, #ffffff 50%, #e6e6e6 100%);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            box-shadow: inset 0px 10px 15px rgba(0,0,0,0.5), 0 0 10px rgba(0,0,0,0.8);
            border: 2px solid #333;
            overflow: hidden;
            position: relative;
        }

        /* Pörgés animáció osztály */
        .spinning {
            animation: shake 0.1s infinite;
            filter: blur(2px);
        }

        @keyframes shake {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        /* Gomb stílusa */
        button {
            background: linear-gradient(to bottom, #ffd700, #ff8c00);
            border: none;
            padding: 15px 40px;
            font-size: 1.5em;
            font-weight: bold;
            color: #2b0000;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.6);
            background: linear-gradient(to bottom, #ffdf33, #ffa500);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.4);
        }

        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Eredmény szöveg */
        #result {
            margin-top: 25px;
            font-size: 1.5em;
            font-weight: bold;
            min-height: 35px;
            text-shadow: 0 0 5px #fff;
        }

        .win {
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00 !important;
            animation: pulse 1s infinite;
        }

        .lose {
            color: #ff3333;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="slot-machine">
        <h1>Neon Jackpot</h1>
        <div class="reels-container">
            <div class="reel" id="reel1">🍒</div>
            <div class="reel" id="reel2">🍒</div>
            <div class="reel" id="reel3">🍒</div>
        </div>
        <button id="spin-btn">Pörgetés!</button>
        <div id="result">Sok szerencsét!</div>
    </div>

    <script>
        // A játék szimbólumai
        const symbols = ['🍒', '🍋', '🍉', '🍇', '🔔', '💎', '7️⃣'];
        
        const reelElements = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];
        const spinBtn = document.getElementById('spin-btn');
        const resultDisplay = document.getElementById('result');

        // Véletlenszerű szimbólum kiválasztása
        function getRandomSymbol() {
            return symbols[Math.floor(Math.random() * symbols.length)];
        }

        // Pörgetés logika
        function spin() {
            // Gomb letiltása pörgés közben
            spinBtn.disabled = true;
            resultDisplay.textContent = "Pörgetés...";
            resultDisplay.className = "";

            // Animáció indítása mindhárom tárcsán
            const spinIntervals = [];
            const finalResults = [];

            reelElements.forEach((reel, index) => {
                reel.classList.add('spinning');
                
                // Gyorsan váltogatjuk a szimbólumokat a pörgés illúziójáért
                spinIntervals[index] = setInterval(() => {
                    reel.textContent = getRandomSymbol();
                }, 50);

                // Késleltetett megállítás (balról jobbra haladva)
                setTimeout(() => {
                    clearInterval(spinIntervals[index]);
                    reel.classList.remove('spinning');
                    const finalSymbol = getRandomSymbol();
                    reel.textContent = finalSymbol;
                    finalResults.push(finalSymbol);

                    // Ha az utolsó tárcsa is megállt, ellenőrizzük az eredményt
                    if (index === 2) {
                        checkWin(finalResults);
                        spinBtn.disabled = false;
                    }
                }, 1000 + (index * 500)); // 1s, 1.5s, 2s
            });
        }

        // Nyeremény ellenőrzése
        function checkWin(results) {
            if (results[0] === results[1] && results[1] === results[2]) {
                resultDisplay.textContent = "🎉 JACKPOT! Nyertél! 🎉";
                resultDisplay.className = "win";
            } else {
                resultDisplay.textContent = "Sajnos nem nyert. Próbáld újra!";
                resultDisplay.className = "lose";
            }
        }

        // Eseménykezelő a gombhoz
        spinBtn.addEventListener('click', spin);
    </script>
</body>
</html>
