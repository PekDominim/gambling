<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite 2D Casino - Winner Stops</title>
    <style>
        :root {
            --cell-width: 320px;
            --cell-height: 460px;
        }

        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            padding: 15px;
            text-align: center;
            z-index: 1000;
            border-bottom: 2px solid #444;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            overflow: auto;
            padding-top: 80px;
            scroll-behavior: smooth;
        }

        #casino-grid {
            display: grid;
            grid-template-columns: repeat(var(--cols), var(--cell-width));
            grid-template-rows: repeat(var(--rows), var(--cell-height));
            gap: 30px;
            padding: 40px;
        }

        .slot-machine {
            width: var(--cell-width);
            height: var(--cell-height);
            border-radius: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 15px;
            box-sizing: border-box;
            border: 3px solid #333;
            background: #111;
            transition: all 0.3s ease;
        }

        /* Nyerő gép effekt */
        .winner {
            border-color: #ffcc00 !important;
            box-shadow: 0 0 30px #ffcc0066;
            transform: scale(1.05);
            background: #221a00;
        }

        .reels {
            display: flex;
            justify-content: center;
            gap: 10px;
            background: #000;
            padding: 15px;
            border-radius: 8px;
        }

        .reel {
            width: 60px;
            height: 80px;
            background: white;
            color: black;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            text-decoration: none;
            font-size: 13px;
            transition: 0.2s;
        }

        #back-btn { background: #444; color: white; }
        #spin-all { background: #ffcc00; color: black; }
        #auto-all { background: #ff0055; color: white; }
        .spin-btn { background: #0088ff; color: white; }

        .res { 
            height: 25px; 
            font-size: 14px; 
            margin-top: 5px; 
            font-weight: bold;
        }

        #coords-display {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            padding: 5px 12px;
            font-family: monospace;
            border-radius: 20px;
            border: 1px solid #444;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="casino9.html" id="back-btn" class="btn">⬅ Vissza (casino9.html)</a>
        <button id="spin-all" class="btn">Mindent Pörget</button>
        <button id="auto-all" class="btn">Globális Auto: KI</button>
    </div>

    <div id="viewport">
        <div id="casino-grid"></div>
    </div>

    <div id="coords-display">Pozíció: 0, 0</div>

    <script>
        const symbols = ['🍒', '🍋', '🍉', '💎', '7️⃣', '🔔', '🔥', '👑', '👾'];
        const adjectives = ['Neon', 'Cyber', 'Mega', 'Szuper', 'Retro', 'Space', 'Arany', 'Vatikán', 'Luxus', 'Kripto'];
        const nouns = ['Slot', 'Jackpot', 'Gép', 'Mátrix', 'Zóna', 'Galaxis', 'Spin', 'Király', 'Mag'];

        let rowCount = 5;
        let colCount = 5;
        const machines = [];
        let globalAuto = false;

        const grid = document.getElementById('casino-grid');
        const viewport = document.getElementById('viewport');

        function updateGridStyles() {
            grid.style.setProperty('--cols', colCount);
            grid.style.setProperty('--rows', rowCount);
        }

        class SlotMachine {
            constructor(r, c) {
                this.r = r;
                this.c = c;
                this.config = this.generateConfig();
                this.isLocked = false;
                this.hasWon = false; // Egyéni állapot: nyert-e már?
                this.render();
            }

            generateConfig() {
                const hue = Math.floor(Math.random() * 360);
                return {
                    name: adjectives[Math.floor(Math.random() * adjectives.length)] + " " + nouns[Math.floor(Math.random() * nouns.length)],
                    color: `hsl(${hue}, 80%, 50%)`,
                };
            }

            render() {
                const div = document.createElement('div');
                div.className = 'slot-machine';
                div.style.borderColor = this.config.color;
                div.style.gridRow = this.r;
                div.style.gridColumn = this.c;
                
                div.innerHTML = `
                    <div style="font-size: 10px; opacity: 0.4;">HELYSZÍN: ${this.r} : ${this.c}</div>
                    <h3 style="color: ${this.config.color}; margin: 5px 0;">${this.config.name}</h3>
                    <div class="reels">
                        <div class="reel">?</div><div class="reel">?</div><div class="reel">?</div>
                    </div>
                    <button class="btn spin-btn">Pörgetés</button>
                    <div class="res">Várakozás...</div>
                `;

                grid.appendChild(div);
                this.dom = div;
                this.reels = div.querySelectorAll('.reel');
                this.resTxt = div.querySelector('.res');
                div.querySelector('.spin-btn').onclick = () => {
                    this.hasWon = false; // Manuális pörgetésnél nullázzuk a nyerést
                    this.dom.classList.remove('winner');
                    this.spin();
                };
            }

            spin() {
                if(this.isLocked) return;
                this.isLocked = true;
                this.resTxt.textContent = "SORSOLÁS...";
                this.resTxt.style.color = "white";
                
                const results = [];

                this.reels.forEach((reel, i) => {
                    let count = 0;
                    const interval = setInterval(() => {
                        reel.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                        count++;
                        if(count > 8 + i * 4) {
                            clearInterval(interval);
                            results[i] = reel.textContent;
                            if(i === 2) this.checkResult(results);
                        }
                    }, 60);
                });
            }

            checkResult(results) {
                this.isLocked = false;
                
                // NYERÉS ELLENŐRZÉSE: Mindhárom egyforma?
                if (results[0] === results[1] && results[1] === results[2]) {
                    this.hasWon = true;
                    this.resTxt.textContent = "🎉 JACKPOT! 🎉";
                    this.resTxt.style.color = "#ffcc00";
                    this.dom.classList.add('winner');
                    // Itt megállítjuk: nem hívjuk meg újra a spint hiába van Auto módban
                } else {
                    this.resTxt.textContent = "PRÓBÁLD ÚJRA!";
                    // Csak akkor pörög újra, ha Auto módban van ÉS még nem nyert
                    if(globalAuto && !this.hasWon) {
                        setTimeout(() => this.spin(), 1000);
                    }
                }
            }
        }

        function spawnMachines(startRow, endRow, startCol, endCol) {
            for(let r = startRow; r <= endRow; r++) {
                for(let c = startCol; c <= endCol; c++) {
                    if(!machines.find(m => m.r === r && m.c === c)) {
                        const newMachine = new SlotMachine(r, c);
                        machines.push(newMachine);
                        
                        // Ha be van kapcsolva a globális auto, az újak is elindulnak
                        if(globalAuto) {
                            setTimeout(() => newMachine.spin(), 200 + Math.random() * 1000);
                        }
                    }
                }
            }
        }

        viewport.onscroll = () => {
            const scrollX = viewport.scrollLeft;
            const scrollY = viewport.scrollTop;
            const maxScrollX = grid.offsetWidth - viewport.offsetWidth;
            const maxScrollY = grid.offsetHeight - viewport.offsetHeight;

            document.getElementById('coords-display').textContent = `Pozíció: X:${Math.floor(scrollX/100)}, Y:${Math.floor(scrollY/100)}`;

            if (maxScrollY - scrollY < 600) {
                rowCount += 3;
                updateGridStyles();
                spawnMachines(rowCount - 2, rowCount, 1, colCount);
            }

            if (maxScrollX - scrollX < 600) {
                colCount += 3;
                updateGridStyles();
                spawnMachines(1, rowCount, colCount - 2, colCount);
            }
        };

        updateGridStyles();
        spawnMachines(1, rowCount, 1, colCount);

        document.getElementById('spin-all').onclick = () => {
            machines.forEach(m => {
                m.hasWon = false;
                m.dom.classList.remove('winner');
                m.spin();
            });
        };
        
        document.getElementById('auto-all').onclick = (e) => {
            globalAuto = !globalAuto;
            if(globalAuto) {
                e.target.textContent = "Auto: BE";
                e.target.style.background = "#00ff41";
                e.target.style.color = "black";
                // Csak azokat indítjuk el, amik még nem nyertek
                machines.forEach(m => {
                    if(!m.hasWon) m.spin();
                });
            } else {
                e.target.textContent = "Auto: KI";
                e.target.style.background = "#ff0055";
                e.target.style.color = "white";
            }
        };

    </script>
</body>
</html>
